name: build-and-push-docker

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}

jobs:
  docker:
    name: Build multi-arch image and push
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU (for arm64 emulation on x64 runner)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag
        id: vars
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
          else
            TAG="manual-$(date +%Y%m%d-%H%M%S)"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Compute image name (lowercase)
        id: img
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY}"
          echo "image=${IMAGE,,}" >> $GITHUB_OUTPUT

      - name: Build and push (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.img.outputs.image }}:${{ steps.vars.outputs.tag }}
            ${{ steps.img.outputs.image }}:latest
          build-args: |
            JELLYTINDER_VERSION=${{ steps.vars.outputs.tag }}
          labels: |
            org.opencontainers.image.version=${{ steps.vars.outputs.tag }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
