services:
  jellytinder:
    build:
      context: .
      dockerfile: Dockerfile
    image: jellytinder:latest
    container_name: jellytinder
    ports:
      - "3243:3243"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    environment:
      PORT: "3243"
      DATA_DIR: "/app/data"
    healthcheck:
      test: ["CMD", "/jellytinder", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
